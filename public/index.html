<!DOCTYPE html>
<html>
<head>
    <title>Live Stream</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: sans-serif; }
        #screen { width: 90%; max-width: 1000px; border: 2px solid #0f0; margin-top: 20px; }
        #admin-panel { display: none; padding: 20px; }
        button { padding: 15px; cursor: pointer; background: #f00; color: #fff; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="admin-panel">
        <button id="start">POKRENI PRENOS</button>
    </div>
    
    <h1>Gledalaca: <span id="count">0</span></h1>
    <img id="screen" src="">

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const socket = io();
        const img = document.getElementById('screen');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const isAdmin = new URLSearchParams(window.location.search).get('admin') === '1';

        if (isAdmin) document.getElementById('admin-panel').style.display = 'block';

        socket.on('count', (n) => { document.getElementById('count').innerText = n; });

        if (isAdmin) {
            document.getElementById('start').onclick = async () => {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                setInterval(() => {
                    canvas.width = video.videoWidth / 2; 
                    canvas.height = video.videoHeight / 2;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.5);
                    socket.emit('screen-data', base64);
                }, 100); 
            };
        }

        socket.on('show-screen', (data) => {
            img.src = data;
        });
    </script>
</body>
</html>
